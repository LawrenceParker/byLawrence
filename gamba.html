<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Gamba</title>

    <link rel="stylesheet" href="gamba.css">

</head>


<body>


<div class="game-container">


    <!-- HEADER -->

    <header class="game-header">


        <div>

            <h1>
                🎁
            </h1>

            <p>
                Open. Collect. Discover.
            </p>

        </div>


        <div class="profile">

            <span>
                Player
            </span>

            <strong>
                Guest
            </strong>

        </div>


    </header>



    <!-- PLAYER ECONOMY -->


    <section class="economy-panel">


        <div class="currency-card">

            <span>
                💳 Credits
            </span>

            <strong id="credits">
                1000
            </strong>

        </div>



        <div class="currency-card">

            <span>
                💎 Total Value
            </span>

            <strong id="totalValue">
                0
            </strong>

        </div>



        <div class="currency-card">

            <span>
                📦 Lootboxes
            </span>

            <strong id="boxes">
                1
            </strong>

        </div>


    </section>





    <main>



        <!-- LOOTBOX AREA -->


        <section class="loot-section">


            <div id="lootbox"
                 class="lootbox">


                📦


            </div>



        <div class="lootbox-actions">

            <button id="buyBoxButton">
                Buy Lootbox
                <br>
                💳 100 Credits
            </button>


            <button id="openButton">
                Open Lootbox
            </button>

        </div>



            <div id="rewardDisplay"
                 class="reward-display">


                <h2>
                    Awaiting Drop...
                </h2>


                <p id="result">

                    Open a box to discover your reward.

                </p>


            </div>



        </section>





        <!-- INVENTORY -->


        <section class="inventory-section">


            <h2>
                🎒 Inventory
            </h2>


            <div id="inventory"
                 class="inventory-grid">


                <p class="empty">

                    Your inventory is empty.

                </p>


            </div>


        </section>





        <!-- DROP HISTORY -->


        <section class="history-section">


            <h2>
                📜 Recent Drops
            </h2>


            <div id="history">

            </div>


        </section>





        <!-- SHOP PLACEHOLDER -->


        <section class="shop-section">


            <h2>
                🛒 Shop
            </h2>


            <p>

                Coming soon...

            </p>


        </section>



    </main>




    <!-- CONTROLS -->


    <footer>


        <button id="saveButton">

            Save Game

        </button>



        <button id="resetButton"
                class="danger">

            Reset Save

        </button>



    </footer>



</div>




<script src="gamba.js"></script>


</body>


</html>
