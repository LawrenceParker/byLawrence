<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FORZA HORIZONN 6 - Time Attack</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="fh6-style.css">
</head>
<body>

<a class="back-link" href="index.html">← Back to Home</a>

<header class="hero">
  <div class="hero__inner">
    <p class="hero__eyebrow">FH6 · TIME ATTACK</p>
    <h1 class="hero__title">TIME<span>ATTACK</span></h1>
    <div class="hero__stats" id="heroStats">
      <div class="hero__stat"><span class="hero__stat-num" id="statTracks">–</span><span class="hero__stat-label">Tracks</span></div>
      <div class="hero__stat"><span class="hero__stat-num" id="statCars">–</span><span class="hero__stat-label">Cars</span></div>
      <div class="hero__stat"><span class="hero__stat-num" id="statLaps">–</span><span class="hero__stat-label">Laps Logged</span></div>
      <div class="hero__stat"><span class="hero__stat-num" id="statLatest">–</span><span class="hero__stat-label">Latest Session</span></div>
    </div>
  </div>
</header>

<nav class="tabs" id="tabs">
  <button class="tab is-active" data-tab="leaderboard">Leaderboard</button>
  <button class="tab" data-tab="laplog">Lap Log</button>
</nav>

<main class="content">

  <!-- LEADERBOARD -->
  <section class="panel is-active" id="panel-leaderboard">
    <div class="panel__controls">
      <span class="control-label">Track</span>
      <div class="chip-row" id="leaderboardTrackChips"></div>
    </div>
    <div class="panel__controls">
      <span class="control-label">Class</span>
      <div class="chip-row" id="leaderboardClassChips"></div>
    </div>
    <div id="leaderboardContainer"></div>
  </section>

  <!-- LAP LOG -->
  <section class="panel" id="panel-laplog">
    <div class="panel__controls">
      <span class="control-label">Track</span>
      <div class="chip-row" id="lapLogTrackChips"></div>
    </div>
    <div class="race-list">
      <div class="race-item race-item--head">
        <span></span>
        <span>Car</span>
        <span>Class</span>
        <span>PI</span>
        <span>Best Lap</span>
        <span>Laps</span>
      </div>
      <div id="lapLogAccordion"></div>
    </div>
  </section>

</main>

<footer class="footer">
  <p>Data pulled live from the league spreadsheet · <span id="footerCount">–</span> laps logged</p>
</footer>

<script src="fh6-script.js"></script>
</body>
</html>
