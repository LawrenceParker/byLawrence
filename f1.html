<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>F1 Picks</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="f1-style.css">
</head>
<body>

<a class="back-link" href="index.html">← Back to Home</a>

<header class="hero">
  <div class="hero__inner">
    <p class="hero__eyebrow">F1 · DRIVER PICKS</p>
    <h1 class="hero__title">FORMULA ONE <span>PICKS</span></h1>
    <div class="hero__stats" id="heroStats">
      <div class="hero__stat"><span class="hero__stat-num" id="statRaces">–</span><span class="hero__stat-label">Races Completed</span></div>
      <div class="hero__stat"><span class="hero__stat-num" id="statRacers">–</span><span class="hero__stat-label">Racers</span></div>
      <div class="hero__stat"><span class="hero__stat-num" id="statLeader">–</span><span class="hero__stat-label">Current Leader</span></div>
    </div>
  </div>
</header>

<main class="content">

  <!-- LEADERBOARD -->
  <section class="section">
    <h2 class="section-title">Leaderboard</h2>
    <div class="leaderboard-grid" id="leaderboardGrid"></div>
  </section>

  <!-- RACE PICKS -->
  <section class="section">
    <h2 class="section-title">Race Picks</h2>
    <div class="table-wrap">
      <table class="picks-table" id="picksTable">
        <thead><tr id="picksHeaderRow"></tr></thead>
        <tbody id="picksBody"></tbody>
      </table>
    </div>
  </section>

  <!-- RUNNING TOTAL CHART -->
  <section class="section">
    <h2 class="section-title">Running Total</h2>
    <div class="chart-legend" id="chartLegend"></div>
    <div class="chart-wrap" id="chartWrap"></div>
  </section>

</main>

<footer class="footer">
  <p>Data pulled live from the league spreadsheet · <span id="footerCount">–</span> picks logged</p>
</footer>

<script src="f1-script.js"></script>
</body>
</html>
